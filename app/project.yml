name: Makanapo
options:
  bundleIdPrefix: fm.makana
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # set your Apple Developer Team ID in Xcode (Signing & Capabilities)
targets:
  Makanapo:
    type: application
    platform: iOS
    sources:
      - path: Makanapo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fm.makana.makanapo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        # Partial plist holds UIBackgroundModes (audio); GENERATE_INFOPLIST_FILE
        # layers the INFOPLIST_KEY_* values below on top of it. INFOPLIST_KEY_UIBackgroundModes
        # is NOT auto-injected by Xcode, so the array MUST live in this file.
        INFOPLIST_FILE: Makanapo/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: makana.fm
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        TARGETED_DEVICE_FAMILY: "1"
  MakanapoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MakanapoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: fm.makana.makanapoTests
    dependencies:
      - target: Makanapo
